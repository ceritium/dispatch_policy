<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="dispatch_policy">
  <rect width="240" height="240" rx="48" fill="#0F172A"/>

  <!-- Three partitions (lanes) -->
  <g stroke="#334155" stroke-width="3" stroke-linecap="round">
    <line x1="44" y1="84"  x2="196" y2="84"/>
    <line x1="44" y1="120" x2="196" y2="120"/>
    <line x1="44" y1="156" x2="196" y2="156"/>
  </g>

  <!-- Queued jobs (waiting on the left of the gate) -->
  <g fill="#64748B">
    <circle cx="60"  cy="84"  r="7"/>
    <circle cx="80"  cy="84"  r="7"/>
    <circle cx="100" cy="84"  r="7"/>

    <circle cx="60"  cy="120" r="7"/>
    <circle cx="80"  cy="120" r="7"/>

    <circle cx="60"  cy="156" r="7"/>
    <circle cx="80"  cy="156" r="7"/>
    <circle cx="100" cy="156" r="7"/>
  </g>

  <!-- The gate -->
  <line x1="120" y1="48" x2="120" y2="192"
        stroke="#F8FAFC" stroke-width="5" stroke-linecap="round"/>

  <!-- Admitted jobs (passed the gate, on the right) -->
  <g fill="#38BDF8">
    <circle cx="160" cy="84"  r="7"/>
    <circle cx="160" cy="120" r="7"/>
    <circle cx="160" cy="156" r="7"/>
  </g>
</svg>
